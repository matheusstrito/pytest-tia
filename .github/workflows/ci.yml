name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest coverage

      - name: Run tests with coverage
        run: |
          coverage run --source=tia -m pytest
          coverage xml
          coverage report

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml
